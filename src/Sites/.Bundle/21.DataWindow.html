<div ComponentName="App.Modules.Sites.DataWindow">
    <component-container>
        <Split name="split" shown="true" hasHandle="true">
            <App.Modules.Sites.StoragesTree name="storages" shown="true" binding="app.manage.storages" />
            <Pane name="data-pane" shown="true">
                <FlexBox name="search-pane" shown="true">
                    <Input name="search-input" shown="true" placeholder="#{sites-datawindow-search-placeholder}" enabled="false" />
                    <Icon shown="true" name="filters" iconSVG="Colibri.UI.Filters"  enabled="false" />
                </FlexBox>
                <App.Modules.Sites.DataGrid name="data" shown="true" binding="app.sites.data" enabled="false" selectionMode="fullrow" showCheckboxes="true" emptyMessage="#{sites-datawindow-dataempty}" />
                <App.Modules.Sites.UI.Pager shown="true" name="pager" hasMaxPages="false" enabled="false" />
            </Pane>
        </Split>
    </component-container>
    <component-footer>
        <SuccessButton name="save" shown="true" enabled="false" value="#{sites-datawindow-buttons-publish}" />
        <SimpleButton name="cancel" shown="true" value="#{sites-datawindow-buttons-close}" OnClicked="(event, args) => this.Hide()" />
    </component-footer>

    
</div>
